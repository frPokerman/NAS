permissions:
    # @desc If files can only be downloaded or streamed.
    read-only: false
    # @desc If files can only be added, not downloaded or streamed.
    write-only: false

# @name Display hidden files
# @desc If files tagged as hidden can be displayed.
hidden-files: true

confidentiality:
    # @desc If each file is stored on the server as one or split among several binary files.
    split-chunks: false
    # @desc If file access can be logged and used for analytics.
    access-analytics: false